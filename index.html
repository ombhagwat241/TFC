<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trek Finders Community</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            overflow-x: hidden;
        }

        .hero {
            height: 50vh;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 0;
            overflow: hidden;
            background: #000;
            /* Fallback */
        }

        .bg-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .bg-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bg-slide.active {
            opacity: 1;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4));
            z-index: 2;
        }

        nav {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 100;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .nav-logo img {
            height: 40px;
            margin-right: 10px;
            border-radius: 100px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #fb7601;
        }

        .close-btn {
            display: none;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: #ffffff;
            border-radius: 0;
        }

        .hero-content {
            text-align: center;
            color: #ffffff;
            z-index: 10;
            margin-top: 60px;
            width: 100%;
            padding: 0 20px;
        }

        @keyframes logoBounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .hero-logo {
            height: 55px;
            width: auto;
            margin-bottom: 20px;
        }

        .hero-logo.animate {
            animation: logoBounce 0.4s ease-out;
        }

        .carousel-text {
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 25px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            position: absolute;
            width: 100%;
            left: 0;
            white-space: nowrap;
        }

        .carousel-text.active {
            opacity: 1;
            transform: translateY(0);
        }

        .carousel-container {
            position: relative;
            height: 30px;
            margin-bottom: 20px;
            width: 100%;
        }

        .carousel-indicators {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            height: 20px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 0;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .dot.active {
            background: #fb7601;
            transform: scale(1.4);
        }

        @media (max-width: 768px) {
            .nav-links {
                display: flex;
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                margin: 0;
                padding: 0;
                background: #ffffff;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                border-radius: 0;
                border: none;
                z-index: 99999;
                transform: translateX(100%);
                visibility: hidden;
                transition: transform 0.4s ease, visibility 0.4s ease;
            }

            .nav-links.show {
                transform: translateX(0);
                visibility: visible;
            }

            .nav-links a {
                color: #333;
                font-size: 1.15rem;
                margin-bottom: 15px;
                font-weight: 600;
            }

            .close-btn {
                display: block;
                position: absolute;
                top: 18px;
                right: 30px;
                background: none;
                border: none;
                font-size: 2.5rem;
                color: #333;
                cursor: pointer;
            }

            .hamburger {
                display: flex;
            }

            nav {
                top: 10px;
                left: 10px;
                right: 10px;
                padding: 12px 20px;
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
            }
        }

        .enquiry-section {
            padding: 0 10px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 25vh;
            background: #ffffff;
        }

        .enquiry-card {

            z-index: 10;
            margin-top: 40px;
        }

        .enquiry-card h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            color: #1a202c;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .enquiry-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.8rem;
            color: #8995aa;
            font-weight: 400;
            font-family: 'Outfit', sans-serif;
            text-align: left;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .input-wrapper svg {
            position: absolute;
            left: 14px;
            width: 18px;
            height: 18px;
            color: #fb7601;
            pointer-events: none;
        }

        .input-wrapper input,
        .input-wrapper select {
            width: 100%;
            padding: 11px 16px 11px 42px;
            background: #ffffff;
            border: 1.5px solid #fb7601;
            font-size: 1rem;
            color: #2d3748;
            outline: none;
            transition: all 0.3s ease;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
        }

        .input-wrapper input:focus,
        .input-wrapper select:focus {
            border-color: #e06900;
            box-shadow: 0 0 0 3px rgba(251, 118, 1, 0.15);
        }

        .input-wrapper select {
            color: #2d3748;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23fb7601' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 16px;
        }

        .submit-btn {
            grid-column: span 2;
            padding: 12px;
            background: #fb7601;
            color: #ffffff;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 5px;
            letter-spacing: 1px;
            border-radius: 8px;
        }

        .submit-btn:hover {
            background: #e06900;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(251, 118, 1, 0.2);
        }

        @media (max-width: 600px) {
            .enquiry-form {
                grid-template-columns: 1fr;
                gap: 22px;
            }

            .submit-btn {
                grid-column: span 1;
                padding: 10px;
            }

            .enquiry-card {
                padding: 28px 20px;
                margin-top: 20px;
            }
        }
    </style>
</head>

<body>

    <section class="hero">
        <div class="bg-slider">
            <div class="bg-slide active" style="background-image: url('assets/1.jpg');"></div>
            <div class="bg-slide" style="background-image: url('assets/2.jpg');"></div>
            <div class="bg-slide" style="background-image: url('assets/3.jpg');"></div>
        </div>

        <div class="hero-overlay"></div>

        <nav>
            <a href="#" class="nav-logo">
                <img src="assets/logo.jpg" alt="Logo" onerror="this.src='https://via.placeholder.com/40'" />

            </a>

            <ul class="nav-links" id="nav-links">
                <button class="close-btn" id="close-btn">&times;</button>
                <li><a href="#">Home</a></li>
                <li><a href="#">Trails</a></li>
                <li><a href="#">Community</a></li>
            </ul>

            <button class="hamburger" id="hamburger-btn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>

        <div class="hero-content">
            <img src="assets/hero-logo.png" class="hero-logo" alt="Trek Finders Community Logo" />

            <div class="carousel-container">
                <div class="carousel-text active">Waterfalls trecks</div>
                <div class="carousel-text">Explore beautiful places</div>
                <div class="carousel-text">Visit mahashtras forts</div>
            </div>

            <div class="carousel-indicators">
                <div class="dot active" data-index="0"></div>
                <div class="dot" data-index="1"></div>
                <div class="dot" data-index="2"></div>
            </div>
        </div>
    </section>

    <section class="enquiry-section">
        <div class="enquiry-card">
            <h2>Quick Enquiry</h2>
            <form action="#" class="enquiry-form">

                <div class="input-group">
                    <label for="name">Your Name</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        <input type="text" id="name" required placeholder="Your name">
                    </div>
                </div>

                <div class="input-group">
                    <label for="location">Current Location</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        <input type="text" id="location" required placeholder="Your location">
                    </div>
                </div>

                <div class="input-group">
                    <label for="trip">Trip Location</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064" />
                        </svg>
                        <select id="trip" required>
                            <option value="" disabled selected hidden>Select Trip</option>
                            <option value="sahyadri">Sahyadri Trek</option>
                            <option value="himalaya">Himalayan Expedition</option>
                            <option value="konkan">Konkan Camping</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="contact">Contact Number</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                        </svg>
                        <input type="tel" id="contact" required placeholder="Your contact number">
                    </div>
                </div>

                <button type="submit" class="submit-btn">Send Enquiry</button>
            </form>
        </div>
    </section>
    <script>
        // Hamburger Menu
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const closeBtn = document.getElementById('close-btn');
        const navLinks = document.getElementById('nav-links');

        hamburgerBtn.addEventListener('click', () => {
            navLinks.classList.add('show');
        });

        closeBtn.addEventListener('click', () => {
            navLinks.classList.remove('show');
        });

        // Carousel Logic
        const texts = document.querySelectorAll('.carousel-text');
        const dots = document.querySelectorAll('.dot');
        const slides = document.querySelectorAll('.bg-slide');
        const heroLogo = document.querySelector('.hero-logo');
        let currentIndex = 0;

        function showSlide(index) {
            // Remove active class from all
            texts.forEach(text => text.classList.remove('active'));
            dots.forEach(dot => dot.classList.remove('active'));
            slides.forEach(slide => slide.classList.remove('active'));

            // Add active class to current index
            texts[index].classList.add('active');
            dots[index].classList.add('active');
            slides[index].classList.add('active');

            // Trigger logo animation
            if (heroLogo) {
                heroLogo.classList.remove('animate');
                void heroLogo.offsetWidth; // Trigger reflow to restart animation
                heroLogo.classList.add('animate');
            }

            currentIndex = index;
        }

        function nextSlide() {
            let nextIndex = (currentIndex + 1) % texts.length;
            showSlide(nextIndex);
        }

        let interval = setInterval(nextSlide, 3000);

        dots.forEach((dot, index) => {
            dot.addEventListener('click', () => {
                clearInterval(interval);
                showSlide(index);
                interval = setInterval(nextSlide, 3000);
            });
        });
    </script>
</body>

</html>
