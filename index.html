<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Trek Finders Community – Discover breathtaking trails, connect with fellow adventurers, and embark on your next great outdoor journey." />

    <!-- TODO(security): Replace nonce with a server-generated random nonce per request in production. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self';
                 script-src 'self' 'nonce-tfc2026';
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                 font-src https://fonts.gstatic.com;
                 img-src 'self' data:;
                 media-src 'self';
                 frame-ancestors 'none';
                 object-src 'none';" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />

    <title>Trek Finders Community – Explore Beyond the Horizon</title>

    <!-- Google Fonts – Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet" />

    <style>
        /* ─── Reset & Base ─────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --white: #ffffff;
            --accent: #fb7601;
            --accent-dark: #c45800;
            --overlay-start: rgba(10, 5, 1, 0.55);
            --overlay-end: rgba(18, 7, 1, 0.82);
            --nav-bg: rgba(18, 7, 1, 0.35);
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.14);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a141e;
            color: var(--white);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ─── Navigation ────────────────────────────────────────────── */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            padding: 1.2rem 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--nav-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--glass-border);
            transition: background 0.4s ease;
        }

        .nav-logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 0.04em;
            color: var(--white);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            flex-shrink: 0;
        }

        .nav-logo-icon {
            height: 40px;
            width: auto;
            display: block;
            object-fit: contain;
            border-radius: 100px;
        }

        /* Links absolutely centered in nav */
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            align-items: center;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.03em;
            transition: color 0.25s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 0;
            height: 1.5px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--white);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-cta {
            padding: 0.55rem 1.4rem;
            background: linear-gradient(135deg, var(--accent-dark), var(--accent));
            color: var(--white) !important;
            border-radius: 30px;
            font-weight: 600 !important;
            font-size: 0.85rem !important;
            transition: transform 0.2s ease, box-shadow 0.2s ease !important;
        }

        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(251, 118, 1, 0.45);
        }

        .nav-cta::after {
            display: none !important;
        }

        /* Hamburger */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
        }

        .hamburger span {
            display: block;
            width: 26px;
            height: 2px;
            background: var(--white);
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        /* ─── Hero Section ──────────────────────────────────────────── */
        .hero {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Video Background */
        .hero-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            z-index: 0;
        }

        /* Gradient overlay */
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg,
                    var(--overlay-start) 0%,
                    var(--overlay-end) 100%);
            z-index: 1;
        }

        /* Radial glow behind text */
        .hero-gloww {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(251, 118, 1, 0.22) 0%, transparent 70%);
            z-index: 2;
            pointer-events: none;
        }

        /* ─── Hero Content ──────────────────────────────────────────── */
        .hero-content {
            position: relative;
            z-index: 3;
            text-align: center;
            padding: 0 1.5rem;
            max-width: 900px;
            width: 100%;
            animation: fadeUp 1s ease both;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 0.45rem 1.1rem;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 1.6rem;
            animation: fadeUp 1s 0.1s ease both;
        }

        .badge-dot {
            width: 7px;
            height: 7px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .hero-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: clamp(2.8rem, 8vw, 6.5rem);
            line-height: 1.05;
            letter-spacing: -0.02em;
            color: var(--white);
            filter: drop-shadow(0 4px 24px rgba(0, 0, 0, 0.55));
            margin-bottom: 1.5rem;
            animation: fadeUp 1s 0.2s ease both;
        }

        .hero-title .highlight {
            background: linear-gradient(135deg, var(--accent-dark), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 1;
            display: inline-block;
        }

        .hero-subtitle {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.72);
            line-height: 1.7;
            max-width: 560px;
            margin: 0 auto 2.5rem;
            animation: fadeUp 1s 0.35s ease both;
        }

        .hero-actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            animation: fadeUp 1s 0.5s ease both;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.85rem 2.2rem;
            background: linear-gradient(135deg, var(--accent-dark), var(--accent));
            color: var(--white);
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            border-radius: 50px;
            text-decoration: none;
            letter-spacing: 0.02em;


        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(251, 118, 1, 0.15);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.82rem 2.1rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);

            color: var(--white);
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 50px;
            text-decoration: none;
            letter-spacing: 0.02em;

        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.14);
            transform: translateY(-3px);
        }

        /* ─── Stats Row ─────────────────────────────────────────────── */
        .hero-stats {
            position: absolute;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            display: flex;
            gap: 3rem;
            animation: fadeUp 1s 0.7s ease both;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 1rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.7rem;
            color: var(--white);
            line-height: 1;
        }

        .stat-label {
            font-size: 0.75rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.55);
            margin-top: 0.3rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .stat-divider {
            width: 1px;
            height: 36px;
            background: var(--glass-border);
            align-self: center;
        }

        /* ─── Scroll Indicator ──────────────────────────────────────── */
        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            opacity: 0.6;
            animation: fadeIn 1.5s 1s ease both;
        }

        .scroll-line {
            width: 1px;
            height: 45px;
            background: linear-gradient(to bottom, transparent, var(--white));
            animation: scrollDrop 2s ease infinite;
        }

        .scroll-text {
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            writing-mode: vertical-rl;
            color: var(--white);
        }

        /* ─── Keyframes ─────────────────────────────────────────────── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 0.6;
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.5);
                opacity: 0.5;
            }
        }

        @keyframes scrollDrop {
            0% {
                transform: scaleY(0);
                transform-origin: top;
            }

            50% {
                transform: scaleY(1);
                transform-origin: top;
            }

            51% {
                transform: scaleY(1);
                transform-origin: bottom;
            }

            100% {
                transform: scaleY(0);
                transform-origin: bottom;
            }
        }

        /* ─── Button transitions (base) ───────────────────────────── */
        .btn-primary {
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            box-shadow: 0 6px 30px rgba(251, 118, 1, 0.4);
        }

        .btn-secondary {
            transition: background 0.25s ease, transform 0.25s ease;
            backdrop-filter: blur(10px);
        }

        /* ─── Hero content top padding so nav never overlaps ────── */
        .hero-content {
            padding-top: 5rem;
        }

        /* ─── Responsive ────────────────────────────────────────────── */

        /* Large desktop – 1200px+ already handled by base styles      */

        /* Tablet landscape ─────────────────────────────────────────── */
        @media (max-width: 1024px) {
            nav {
                padding: 1rem 2rem;
            }

            .nav-links {
                gap: 1.5rem;
            }

            .hero-glow {
                width: 500px;
                height: 300px;
            }

            .hero-stats {
                gap: 2rem;
            }
        }

        /* Tablet portrait ──────────────────────────────────────────── */
        @media (max-width: 768px) {
            nav {
                padding: 0.9rem 1.2rem;
            }

            /* Full-screen mobile nav overlay */
            .nav-links {
                display: none;
                position: fixed;
                inset: 0;
                width: 100%;
                height: 100vh;
                background: rgba(12, 5, 1, 0.97);
                backdrop-filter: blur(24px);
                -webkit-backdrop-filter: blur(24px);
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 2.2rem;
                z-index: 99;
                list-style: none;
                /* Reset desktop centering */
                left: 0;
                transform: none;
            }

            .nav-links.open {
                display: flex;
            }

            .nav-links a {
                font-size: 1.35rem;
                font-weight: 500;
            }

            .nav-cta {
                font-size: 1rem !important;
                padding: 0.65rem 1.8rem !important;
            }

            .hamburger {
                display: flex;
                z-index: 110;
                position: relative;
            }

            /* Hero */
            .hero-content {
                padding: 6rem 1.2rem 1.2rem;
            }

            .hero-glow {
                width: 320px;
                height: 200px;
            }

            /* Stats row */
            .hero-stats {
                gap: 1.4rem;
                bottom: 2rem;
                width: 100%;
                padding: 0 1rem;
            }

            .stat-divider {
                display: none;
            }

            .stat-number {
                font-size: 1.4rem;
            }

            /* Scroll indicator hidden on tablet/mobile */
            .scroll-indicator {
                display: none;
            }
        }

        /* Phone ────────────────────────────────────────────────────── */
        @media (max-width: 480px) {
            nav {
                padding: 0.8rem 1rem;
            }

            .nav-logo-icon {
                height: 32px;
            }

            .hero-content {
                padding: 5.5rem 1rem 1rem;
                max-width: 100%;
            }

            .hero-title {
                font-size: clamp(2.2rem, 11vw, 3.2rem);
                letter-spacing: -0.01em;
                line-height: 1.1;
            }

            .hero-subtitle {
                font-size: 0.95rem;
                margin-bottom: 2rem;
            }

            .hero-actions {
                flex-direction: column;
                gap: 0.75rem;
                align-items: stretch;
            }

            .btn-primary,
            .btn-secondary {
                width: 100%;
                justify-content: center;
                padding: 0.9rem 1.5rem;
                font-size: 0.95rem;
            }

            /* Stats in 2×2 grid on phones */
            .hero-stats {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 1rem 2rem;
                bottom: 1.5rem;
                left: 50%;
                transform: translateX(-50%);
                width: calc(100% - 2rem);
            }

            .stat-number {
                font-size: 1.3rem;
            }

            .stat-label {
                font-size: 0.68rem;
            }
        }

        /* Very small phones (360px and below) ─────────────────────── */
        @media (max-width: 360px) {
            .hero-title {
                font-size: clamp(1.9rem, 12vw, 2.5rem);
            }

            .hero-subtitle {
                font-size: 0.88rem;
            }

            nav {
                padding: 0.75rem 0.9rem;
            }

            .nav-logo-icon {
                height: 28px;
            }

            .hero-stats {
                gap: 0.75rem 1.5rem;
            }

            .stat-number {
                font-size: 1.15rem;
            }
        }

        /* ─── Fallback gradient when video can't load ───────────────── */
        .hero-fallback {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg,
                    #2e1200 0%,
                    #1a0d02 40%,
                    #120800 100%);
            z-index: -1;
        }
    </style>
</head>

<body>

    <!-- ─── Navigation ─────────────────────────────────────────── -->
    <nav id="main-nav" aria-label="Main Navigation">
        <a href="#" class="nav-logo" id="logo-link">
            <img src="assets/logo.jpg" alt="Trek Finders Community Logo" class="nav-logo-icon" />
        </a>

        <ul class="nav-links" id="nav-links" role="list">
            <li><a href="#" id="nav-home">Home</a></li>
            <li><a href="#" id="nav-trails">Trails</a></li>
            <li><a href="#" id="nav-community">Community</a></li>
            <li><a href="#" id="nav-events">Events</a></li>
            <li><a href="#" class="nav-cta" id="nav-join">Join Us</a></li>
        </ul>

        <button class="hamburger" id="hamburger-btn" aria-label="Toggle navigation menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <!-- ─── Hero Section ───────────────────────────────────────── -->
    <section class="hero" id="hero" aria-label="Hero">

        <!-- Fallback gradient (behind video) -->
        <div class="hero-fallback" aria-hidden="true"></div>

        <!-- Background Video -->
        <video class="hero-video" id="hero-video" autoplay muted loop playsinline preload="auto" aria-hidden="true">
            <source src="assets/bg-video.mp4" type="video/mp4" />
        </video>

        <!-- Overlay -->
        <div class="hero-overlay" aria-hidden="true"></div>

        <!-- Radial glow -->
        <div class="hero-glow" aria-hidden="true"></div>

        <!-- Main Content -->
        <div class="hero-content">


            <h1 class="hero-title" id="hero-title">
                Trek Finders<br />
                <span class="highlight">Community</span>
            </h1>

            <p class="hero-subtitle" id="hero-subtitle">
                Discover breathtaking trails, connect with fellow adventurers,
                and embark on your next great outdoor journey together.
            </p>

            <div class="hero-actions">
                <a href="#" class="btn-primary" id="cta-explore">
                    Explore Trails
                </a>
                <a href="#" class="btn-secondary" id="cta-community">
                    Join Community
                </a>
            </div>
        </div>

        <!-- Stats -->
        <div class="hero-stats" aria-label="Community statistics">
            <div class="stat-item">
                <div class="stat-number" id="stat-members">12K+</div>
                <div class="stat-label">Members</div>
            </div>
            <div class="stat-divider" aria-hidden="true"></div>
            <div class="stat-item">
                <div class="stat-number" id="stat-trails">850+</div>
                <div class="stat-label">Trails</div>
            </div>
            <div class="stat-divider" aria-hidden="true"></div>
            <div class="stat-item">
                <div class="stat-number" id="stat-countries">38</div>
                <div class="stat-label">Countries</div>
            </div>
            <div class="stat-divider" aria-hidden="true"></div>
            <div class="stat-item">
                <div class="stat-number" id="stat-events">200+</div>
                <div class="stat-label">Events/Year</div>
            </div>
        </div>

        <!-- Scroll Indicator -->
        <div class="scroll-indicator" aria-hidden="true">
            <span class="scroll-text">Scroll</span>
            <div class="scroll-line"></div>
        </div>

    </section>

    <!-- TODO(security): Add server-side rendered nonce to this script tag in production. -->
    <script nonce="tfc2026">
        // ── Hamburger menu toggle ──────────────────────────────────────
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const navLinks = document.getElementById('nav-links');

        hamburgerBtn.addEventListener('click', function () {
            const isOpen = navLinks.classList.toggle('open');
            hamburgerBtn.setAttribute('aria-expanded', String(isOpen));
        });

        // Close menu when a nav link is clicked
        navLinks.querySelectorAll('a').forEach(function (link) {
            link.addEventListener('click', function () {
                navLinks.classList.remove('open');
                hamburgerBtn.setAttribute('aria-expanded', 'false');
            });
        });

        // ── Nav background on scroll ───────────────────────────────────
        const mainNav = document.getElementById('main-nav');
        window.addEventListener('scroll', function () {
            if (window.scrollY > 60) {
                mainNav.style.background = 'rgba(5, 10, 18, 0.92)';
            } else {
                mainNav.style.background = 'var(--nav-bg)';
            }
        }, { passive: true });

        // ── Ensure video plays (autoplay policy fallback) ──────────────
        const heroVideo = document.getElementById('hero-video');
        if (heroVideo) {
            heroVideo.play().catch(function () {
                // Autoplay was blocked; video stays paused – fallback gradient shows.
            });
        }
    </script>

</body>

</html>
