<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trek Finders Community</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            overflow-x: hidden;
        }

        .hero {
            height: 75vh;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 0;
            overflow: hidden;
            background: #000;
            /* Fallback */
        }

        .bg-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .bg-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bg-slide.active {
            opacity: 1;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4));
            z-index: 2;
        }

        nav {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 100;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .nav-logo img {
            height: 40px;
            margin-right: 10px;
            border-radius: 100px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #fb7601;
        }

        .close-btn {
            display: none;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: #ffffff;
            border-radius: 0;
        }

        .hero-content {
            text-align: center;
            color: #ffffff;
            z-index: 10;
        }

        .hero-title {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(2.4rem, 4.5vw, 4rem);
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .carousel-text {
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 25px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            position: absolute;
            width: 100%;
            left: 0;
        }

        .carousel-text.active {
            opacity: 1;
            transform: translateY(0);
        }

        .carousel-container {
            position: relative;
            height: 30px;
            margin-bottom: 20px;
        }

        .carousel-indicators {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            height: 20px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 0;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .dot.active {
            background: #fb7601;
            transform: scale(1.4);
        }

        @media (max-width: 768px) {
            .nav-links {
                display: flex;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100vh;
                margin: 0;
                padding: 0;
                background: #ffffff;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                border-radius: 0;
                border: none;
                z-index: 1000;
                transform: translateX(100%);
                visibility: hidden;
                transition: transform 0.4s ease, visibility 0.4s ease;
            }

            .nav-links.show {
                transform: translateX(0);
                visibility: visible;
            }

            .nav-links a {
                color: #333;
                font-size: 1.5rem;
                margin-bottom: 15px;
                font-weight: 600;
            }

            .close-btn {
                display: block;
                position: absolute;
                top: 18px;
                right: 30px;
                background: none;
                border: none;
                font-size: 2.5rem;
                color: #333;
                cursor: pointer;
            }

            .hamburger {
                display: flex;
            }

            nav {
                top: 10px;
                left: 10px;
                right: 10px;
                padding: 12px 20px;
            }
        }

        .enquiry-section {
            padding: 0 20px 60px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 25vh;
            background: #f8f9fa;
        }

        .enquiry-card {
            background: #ffffff;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 800px;
            border-top: 6px solid #fb7601;
            position: relative;
            z-index: 10;
            margin-top: -100px;
        }

        .enquiry-card h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            color: #1a202c;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .enquiry-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px 24px;
        }

        .input-group {
            position: relative;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 6px 5px;
            background: transparent;
            border: none;
            border-bottom: 2px solid #e2e8f0;
            font-size: 0.95rem;
            color: #2d3748;
            outline: none;
            transition: border-color 0.3s ease;
            border-radius: 0;
            font-family: 'Inter', sans-serif;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-bottom-color: #fb7601;
        }

        .input-group label {
            position: absolute;
            top: 6px;
            left: 5px;
            color: #a0aec0;
            font-size: 0.95rem;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus~label,
        .input-group input:not(:placeholder-shown)~label {
            top: -16px;
            font-size: 0.75rem;
            color: #fb7601;
            font-weight: 500;
        }

        .input-group select {
            color: #a0aec0;
        }

        .input-group select:focus,
        .input-group select:valid {
            color: #2d3748;
        }

        .submit-btn {
            grid-column: span 2;
            padding: 12px;
            background: #fb7601;
            color: #ffffff;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            background: #e06900;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(251, 118, 1, 0.2);
        }

        @media (max-width: 600px) {
            .enquiry-form {
                grid-template-columns: 1fr;
                gap: 22px;
            }

            .submit-btn {
                grid-column: span 1;
                padding: 10px;
            }

            .enquiry-card {
                padding: 20px 15px;
                margin-top: -80px;
            }
        }
    </style>
</head>

<body>

    <section class="hero">
        <div class="bg-slider">
            <div class="bg-slide active" style="background-image: url('assets/1.jpg');"></div>
            <div class="bg-slide" style="background-image: url('assets/2.jpg');"></div>
            <div class="bg-slide" style="background-image: url('assets/3.jpg');"></div>
        </div>

        <div class="hero-overlay"></div>

        <nav>
            <a href="#" class="nav-logo">
                <img src="assets/logo.jpg" alt="Logo" onerror="this.src='https://via.placeholder.com/40'" />

            </a>

            <ul class="nav-links" id="nav-links">
                <button class="close-btn" id="close-btn">&times;</button>
                <li><a href="#">Home</a></li>
                <li><a href="#">Trails</a></li>
                <li><a href="#">Community</a></li>
            </ul>

            <button class="hamburger" id="hamburger-btn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>

        <div class="hero-content">
            <h1 class="hero-title">Trek Finders Community</h1>

            <div class="carousel-container">
                <div class="carousel-text active">Waterfalls trecks</div>
                <div class="carousel-text">Explore beautiful places</div>
                <div class="carousel-text">Visit mahashtras forts</div>
            </div>

            <div class="carousel-indicators">
                <div class="dot active" data-index="0"></div>
                <div class="dot" data-index="1"></div>
                <div class="dot" data-index="2"></div>
            </div>
        </div>
    </section>

    <section class="enquiry-section">
        <div class="enquiry-card">
            <h2>Quick Enquiry</h2>
            <form action="#" class="enquiry-form">
                <div class="input-group">
                    <input type="text" id="name" required placeholder=" ">
                    <label for="name">Your Name</label>
                </div>
                <div class="input-group">
                    <input type="text" id="location" required placeholder=" ">
                    <label for="location">Current Location</label>
                </div>
                <div class="input-group">
                    <select id="trip" required>
                        <option value="" disabled selected hidden>Select Trip Location</option>
                        <option value="sahyadri">Sahyadri Trek</option>
                        <option value="himalaya">Himalayan Expedition</option>
                        <option value="konkan">Konkan Camping</option>
                    </select>
                </div>
                <div class="input-group">
                    <input type="tel" id="contact" required placeholder=" ">
                    <label for="contact">Contact Number</label>
                </div>
                <button type="submit" class="submit-btn">Send Enquiry</button>
            </form>
        </div>
    </section>
    <script>
        // Hamburger Menu
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const closeBtn = document.getElementById('close-btn');
        const navLinks = document.getElementById('nav-links');

        hamburgerBtn.addEventListener('click', () => {
            navLinks.classList.add('show');
        });

        closeBtn.addEventListener('click', () => {
            navLinks.classList.remove('show');
        });

        // Carousel Logic
        const texts = document.querySelectorAll('.carousel-text');
        const dots = document.querySelectorAll('.dot');
        const slides = document.querySelectorAll('.bg-slide');
        let currentIndex = 0;

        function showSlide(index) {
            // Remove active class from all
            texts.forEach(text => text.classList.remove('active'));
            dots.forEach(dot => dot.classList.remove('active'));
            slides.forEach(slide => slide.classList.remove('active'));

            // Add active class to current index
            texts[index].classList.add('active');
            dots[index].classList.add('active');
            slides[index].classList.add('active');

            currentIndex = index;
        }

        function nextSlide() {
            let nextIndex = (currentIndex + 1) % texts.length;
            showSlide(nextIndex);
        }

        let interval = setInterval(nextSlide, 3000);

        dots.forEach((dot, index) => {
            dot.addEventListener('click', () => {
                clearInterval(interval);
                showSlide(index);
                interval = setInterval(nextSlide, 3000);
            });
        });
    </script>
</body>

</html>
